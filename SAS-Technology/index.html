<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS-Tech | پلاتفۆرمی ژیریی دەستکرد</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #070510;
            --bg-card: rgba(15, 11, 30, 0.6);
            --border-color: rgba(139, 92, 246, 0.15);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #06b6d4;
            --text-main: #f3f4f6;
            --text-muted: #a3a3c2;
            --text-white: #ffffff;
            --gradient-primary: linear-gradient(135deg, #a78bfa 0%, #06b6d4 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Vazirmatn', sans-serif; padding-top: 80px; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .main-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(7, 5, 16, 0.85); border-bottom: 1px solid var(--border-color); backdrop-filter: blur(12px); }
        .header-container { display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--text-white); }
        .logo-accent { color: var(--primary); }
        
        /* 🤖 AI WIDGET STYLES */
        .sas-public-agent { position: fixed; bottom: 25px; left: 25px; z-index: 1000; }
        .agent-toggle-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--gradient-primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4); transition: 0.3s; }
        .agent-window { position: absolute; bottom: 75px; left: 0; width: 360px; height: 480px; background: #0d091f; border: 1px solid #8b5cf6; border-radius: 16px; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transform: translateY(20px); transition: 0.3s; }
        .agent-window.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .agent-header { background: #140e2e; padding: 15px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); border-top-left-radius: 16px; border-top-right-radius: 16px; }
        .agent-chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; }
        .msg.bot { background: rgba(139, 92, 246, 0.15); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(139, 92, 246, 0.2); }
        .msg.user { background: #7c3aed; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .agent-footer { padding: 12px; display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
        .form-control { width: 100%; padding: 10px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 8px; color: white; outline: none; font-family: 'Vazirmatn', sans-serif; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="main-header">
        <div class="container header-container">
            <div class="logo">SAS<span class="logo-accent">-Tech</span></div>
        </div>
    </header>

    <div class="container" style="padding: 100px 20px; text-align: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 20px;">بەخێرهاتیت بۆ پلاتفۆرمی SAS-Tech</h1>
        <p style="color: var(--text-muted);">بۆ تاقیکردنەوەی ژیری دەستکردی جەمینای لەسەر ڤێرسێل، کلیک لەسەر پۆتەکەی خوارەوە بکە.</p>
    </div>

    <div class="sas-public-agent">
        <button class="agent-toggle-btn" id="agentToggle">✨</button>
        <div class="agent-window" id="agentWindow">
            <div class="agent-header">
                <span style="color:white; font-weight:700;">SAS-Tech یاریدەدەری</span>
            </div>
            <div class="agent-chat-body" id="agentChatBody">
                <div class="msg bot">سڵاو! من لێرەم بە بەکارهێنانی مۆدێلی Gemini لەسەر گیتهەب وەڵامی پرسیارەکانت بدەمەوە.</div>
            </div>
            <div class="agent-footer">
                <input type="text" id="agentInput" class="form-control" placeholder="پرسیارەکەت لێرە بنووسە...">
                <button class="btn-send" id="agentSendBtn">ناردن</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            _0xSasEngine();
        });

        function _0xSasEngine() {
            const toggle = document.getElementById("agentToggle");
            const win = document.getElementById("agentWindow");
            const input = document.getElementById("agentInput");
            const sendBtn = document.getElementById("agentSendBtn");
            const chatBody = document.getElementById("agentChatBody");

            toggle.addEventListener("click", () => win.classList.toggle("active"));

            async function handleChat() {
                const text = input.value.trim();
                if(!text) return;

                appendMessage(text, "user");
                input.value = "";

                const loadingDiv = document.createElement("div");
                loadingDiv.className = "msg bot";
                loadingDiv.innerText = "🤖 خەریکە وەڵام دەدەمەوە...";
                chatBody.appendChild(loadingDiv);
                chatBody.scrollTop = chatBody.scrollHeight;

                try {
                    // 🎯 ڕێڕەوی فەنکشنەکە گۆڕدرا بۆ /api/chat کە تایبەتە بە ڤێرسێل
                    const response = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: text })
                    });
                    const data = await response.json();
                    
                    chatBody.removeChild(loadingDiv);
                    appendMessage(data.reply, "bot");
                } catch (error) {
                    if(chatBody.contains(loadingDiv)) chatBody.removeChild(loadingDiv);
                    appendMessage("🤖 ببورە، کێشەیەک لە پەیوەندی دروستبوو لەگەڵ سێرڤەر.", "bot");
                }
            }

            sendBtn.addEventListener("click", handleChat);
            input.addEventListener("keypress", (e) => { if(e.key === "Enter") handleChat(); });

            function appendMessage(txt, sender) {
                const d = document.createElement("div");
                d.className = `msg ${sender}`;
                d.innerHTML = txt;
                chatBody.appendChild(d);
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        }
    </script>
</body>
</html>
